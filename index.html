<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fotus Agro - Expedições</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel para compilar o React JSX direto no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Mapa de Importações para pacotes modernos (ES Modules) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
        }
    }
    </script>
    
    <style>
        /* Estilos personalizados para barra de rolagem */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800">

    <div id="root"></div>

    <!-- Aplicação React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Truck, Calendar, CheckSquare, Users, BarChart3, MapPin, 
            Plus, Search, Filter, ChevronRight, Save, X, Menu, 
            LogOut, LayoutDashboard, Briefcase, ClipboardList, 
            MoreVertical, ArrowLeft, Send, CheckCircle2, Clock, 
            AlertTriangle, FileText, Download, Settings, Phone, Mail,
            Loader2, Trash2, Edit2, ExternalLink, UserCircle, ArrowRight
        } from 'lucide-react';

        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, signInWithCustomToken, onAuthStateChanged, signOut } from 'firebase/auth';
        import { 
            getFirestore, collection, addDoc, query, where, 
            getDocs, getDoc, doc, updateDoc, deleteDoc, onSnapshot, writeBatch,
            serverTimestamp, orderBy
        } from 'firebase/firestore';

        // ==========================================
        // 🔴 ATENÇÃO: CONFIGURAÇÃO DO FIREBASE AQUI
        // Crie um projeto no Firebase, ative o Firestore Database e o Authentication (Login Anônimo).
        // Cole suas credenciais no objeto abaixo:
        // ==========================================
        const fallbackConfig = {
            apiKey: "AIzaSyAGrO_8HAT8P9sKupu1nI5OMXOVJYvJN9M",
            authDomain: "expedicao-fotus-agro.firebaseapp.com",
            projectId: "expedicao-fotus-agro",
            storageBucket: "expedicao-fotus-agro.firebasestorage.app",
            messagingSenderId: "837961978108",
            appId: "1:837961978108:web:24e40f8f57097fc0c88779"
        };

        // Usa a configuração do ambiente de visualização se existir, caso contrário usa o fallback
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'expedicao-fotus-agro';

        // --- UTILS ---
        const formatDate = (dateString) => {
            if (!dateString) return '-';
            try {
                const [year, month, day] = dateString.split('-');
                return `${day}/${month}/${year}`;
            } catch (e) { return dateString; }
        };

        const getStatusColor = (status, type) => {
            const map = {
                expedition: {
                    aguardando_aprovacao: "bg-purple-100 text-purple-800 border-purple-200",
                    devolvida: "bg-red-100 text-red-800 border-red-200",
                    planejada: "bg-blue-100 text-blue-800 border-blue-200",
                    em_andamento: "bg-amber-100 text-amber-800 border-amber-200",
                    concluida: "bg-emerald-100 text-emerald-800 border-emerald-200",
                },
                action: {
                    aberta: "bg-slate-100 text-slate-700 border-slate-200",
                    em_andamento: "bg-blue-50 text-blue-700 border-blue-200",
                    concluida: "bg-emerald-50 text-emerald-700 border-emerald-200",
                    atrasada: "bg-red-50 text-red-700 border-red-200",
                },
                visit: {
                    planejada: "bg-gray-100 text-gray-600 border-gray-200",
                    realizada: "bg-emerald-100 text-emerald-800 border-emerald-200",
                    nao_ocorreu: "bg-red-100 text-red-800 border-red-200"
                }
            };
            return map[type]?.[status] || "bg-gray-100 text-gray-800 border-gray-200";
        };

        // --- COMPONENTES UI ---
        const Modal = ({ title, children, onClose, footer }) => (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden animate-scale-up">
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 className="font-bold text-lg text-gray-800">{title}</h3>
                    <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition-colors"><X size={20} className="text-gray-500"/></button>
                </div>
                <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                    {children}
                </div>
                {footer && (
                    <div className="px-6 py-4 bg-gray-50 border-t border-gray-100">
                    {footer}
                    </div>
                )}
                </div>
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', type = 'button', disabled = false, icon: Icon, size = 'md' }) => {
            const variants = {
                primary: "bg-emerald-600 hover:bg-emerald-700 text-white shadow-md shadow-emerald-200",
                secondary: "bg-white border border-gray-300 text-gray-700 hover:bg-gray-50",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200",
                ghost: "text-emerald-600 hover:bg-emerald-50",
            };
            const sizes = {
                sm: "px-3 py-1.5 text-sm",
                md: "px-4 py-2.5",
                lg: "px-6 py-3 text-lg"
            };
            
            return (
                <button 
                    type={type}
                    disabled={disabled}
                    onClick={onClick}
                    className={`${sizes[size]} rounded-lg font-medium transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${className}`}
                >
                {Icon && <Icon size={size === 'sm' ? 16 : 18} />}
                {children}
                </button>
            );
        };

        const Input = ({ label, ...props }) => (
            <div className="mb-4">
                <label className="block text-sm font-medium text-gray-700 mb-1.5">{label}</label>
                <input 
                    className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-sm"
                    {...props}
                />
            </div>
        );

        const Select = ({ label, children, ...props }) => (
            <div className="mb-4">
                <label className="block text-sm font-medium text-gray-700 mb-1.5">{label}</label>
                <div className="relative">
                    <select 
                        className="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-sm appearance-none bg-white"
                        {...props}
                    >
                    {children}
                    </select>
                    <ChevronRight className="absolute right-3 top-3 text-gray-400 rotate-90 pointer-events-none" size={16}/>
                </div>
            </div>
        );

        // --- APP COMPONENT ---
        function App() {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [view, setView] = useState('login'); 
            const [loading, setLoading] = useState(true);
            const [selectedExpeditionId, setSelectedExpeditionId] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [notification, setNotification] = useState(null);

            const [expeditions, setExpeditions] = useState([]);
            const [companies, setCompanies] = useState([]);
            const [actions, setActions] = useState([]);
            const [visits, setVisits] = useState([]);

            const showToast = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        }
                        // Sem token especial: aguarda o usuário fazer login manualmente
                    } catch (e) {
                        console.error("Erro no Auth inicial", e);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        checkUserProfile(currentUser);
                    } else {
                        setView('login');
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            const checkUserProfile = async (currentUser) => {
                try {
                    const profileRef = doc(db, 'users', currentUser.uid);
                    const profileSnap = await getDoc(profileRef);
                    if (profileSnap.exists()) {
                        const profileData = profileSnap.data();
                        setUserProfile({
                            uid: currentUser.uid,
                            name: profileData.name || currentUser.email,
                            email: currentUser.email,
                            role: profileData.role || 'executivo'
                        });
                        setView('dashboard');
                    } else {
                        // Perfil não cadastrado no Firestore
                        await signOut(auth);
                        alert("Usuário não cadastrado no sistema. Contate o administrador da Fotus Agro.");
                    }
                } catch(e) {
                    console.error("Erro ao buscar perfil", e);
                    await signOut(auth);
                    alert("Erro ao carregar perfil. Verifique a conexão e tente novamente.");
                }
                setLoading(false);
            };

            useEffect(() => {
                if (!user) return;

                const unsubExp = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'expeditions'), orderBy('createdAt', 'desc')), 
                    (snap) => setExpeditions(snap.docs.map(d => ({ id: d.id, ...d.data() }))), 
                    err => console.log("Indexes might be needed", err) 
                );

                const unsubComp = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'companies'), 
                    (snap) => setCompanies(snap.docs.map(d => ({ id: d.id, ...d.data() })))
                );

                const unsubAct = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'actions'), 
                    (snap) => setActions(snap.docs.map(d => ({ id: d.id, ...d.data() })))
                );

                const unsubVis = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'visits'), 
                    (snap) => setVisits(snap.docs.map(d => ({ id: d.id, ...d.data() })))
                );

                return () => { unsubExp(); unsubComp(); unsubAct(); unsubVis(); };
            }, [user]);

            const logout = async () => {
                await signOut(auth);
                setUserProfile(null);
            };

            if (loading) return <div className="flex h-screen items-center justify-center bg-emerald-50 text-emerald-800 gap-2"><Loader2 className="animate-spin"/> Carregando...</div>;

            if (view === 'login') return <LoginScreen checkUserProfile={checkUserProfile} />;

            return (
                <div className="flex h-screen bg-gray-50 text-slate-800 font-sans overflow-hidden">
                {notification && (
                    <div className={`fixed top-4 right-4 z-[100] px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium animate-slide-in flex items-center gap-2 ${notification.type === 'error' ? 'bg-red-500' : 'bg-emerald-600'}`}>
                    {notification.type === 'error' ? <AlertTriangle size={18}/> : <CheckCircle2 size={18}/>}
                    {notification.message}
                    </div>
                )}

                {/* Sidebar Desktop */}
                <aside className="hidden md:flex flex-col w-64 bg-emerald-900 text-white shadow-xl">
                    <div className="p-6">
                    <h1 className="text-2xl font-bold tracking-tight">Fotus Agro</h1>
                    <p className="text-emerald-300 text-xs mt-1">Controlador de Expedições</p>
                    </div>
                    <nav className="flex-1 px-3 space-y-1">
                    <NavButton active={view === 'dashboard'} icon={LayoutDashboard} label="Dashboard" onClick={() => setView('dashboard')} />
                    <NavButton active={view === 'expeditions' || view === 'expedition-detail'} icon={Truck} label="Expedições" onClick={() => { setSelectedExpeditionId(null); setView('expeditions'); }} />
                    <NavButton active={view === 'actions'} icon={CheckSquare} label="Plano de Ação" onClick={() => setView('actions')} />
                    <NavButton active={view === 'companies'} icon={Briefcase} label="Empresas" onClick={() => setView('companies')} />
                    </nav>
                    <div className="p-4 bg-emerald-950/50">
                    <div className="flex items-center gap-3 mb-3">
                        <div className="w-9 h-9 rounded-full bg-emerald-500 flex items-center justify-center text-sm font-bold border-2 border-emerald-400">
                        {userProfile?.name?.charAt(0)}
                        </div>
                        <div className="overflow-hidden">
                        <p className="text-sm font-medium truncate">{userProfile?.name}</p>
                        <p className="text-xs text-emerald-400 capitalize">{userProfile?.role}</p>
                        </div>
                    </div>
                    <button onClick={logout} className="flex items-center gap-2 text-sm text-emerald-300 hover:text-white w-full transition-colors">
                        <LogOut size={16} /> Sair
                    </button>
                    </div>
                </aside>

                {/* Main Content */}
                <div className="flex-1 flex flex-col h-full overflow-hidden relative">
                    <header className="md:hidden flex items-center justify-between p-4 bg-emerald-800 text-white shadow-md z-20">
                    <h1 className="font-bold text-lg flex items-center gap-2"><Truck size={20}/> Fotus Agro</h1>
                    <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-1 active:bg-emerald-700 rounded">
                        {mobileMenuOpen ? <X /> : <Menu />}
                    </button>
                    </header>

                    {mobileMenuOpen && (
                    <div className="absolute inset-0 z-10 bg-emerald-900/95 text-white pt-20 px-6 flex flex-col gap-4 md:hidden backdrop-blur-sm animate-fade-in">
                        <NavButton mobile active={view === 'dashboard'} icon={LayoutDashboard} label="Dashboard" onClick={() => { setView('dashboard'); setMobileMenuOpen(false); }} />
                        <NavButton mobile active={view === 'expeditions'} icon={Truck} label="Expedições" onClick={() => { setSelectedExpeditionId(null); setView('expeditions'); setMobileMenuOpen(false); }} />
                        <NavButton mobile active={view === 'actions'} icon={CheckSquare} label="Plano de Ação" onClick={() => { setView('actions'); setMobileMenuOpen(false); }} />
                        <NavButton mobile active={view === 'companies'} icon={Briefcase} label="Empresas" onClick={() => { setView('companies'); setMobileMenuOpen(false); }} />
                        <hr className="border-emerald-700 my-2" />
                        <button onClick={logout} className="flex items-center gap-3 text-lg p-3 text-emerald-200">
                        <LogOut /> Sair
                        </button>
                    </div>
                    )}

                    <main className="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-50 pb-24 md:pb-8">
                    {view === 'dashboard' && (
                        <Dashboard userProfile={userProfile} expeditions={expeditions} actions={actions} setView={setView} />
                    )}
                    {view === 'expeditions' && (
                        <ExpeditionList 
                        expeditions={expeditions} userProfile={userProfile} visits={visits}
                        onSelect={(id) => { setSelectedExpeditionId(id); setView('expedition-detail'); }}
                        db={db} appId={appId} user={user} companies={companies} showToast={showToast}
                        />
                    )}
                    {view === 'expedition-detail' && selectedExpeditionId && (
                        <ExpeditionDetail 
                        expeditionId={selectedExpeditionId} expeditions={expeditions}
                        visits={visits.filter(v => v.expeditionId === selectedExpeditionId)}
                        actions={actions.filter(a => a.expeditionId === selectedExpeditionId)}
                        companies={companies} onBack={() => setView('expeditions')}
                        db={db} appId={appId} user={user} userProfile={userProfile} showToast={showToast}
                        />
                    )}
                    {view === 'actions' && (
                        <ActionPlanGlobal 
                        actions={actions} userProfile={userProfile}
                        db={db} appId={appId} companies={companies} user={user} showToast={showToast}
                        />
                    )}
                    {view === 'companies' && (
                        <CompanyList 
                        companies={companies} db={db} appId={appId} 
                        showToast={showToast} userProfile={userProfile} 
                        />
                    )}
                    </main>
                </div>
                </div>
            );
        }

        // --- SUB-COMPONENTS ---
        function NavButton({ icon: Icon, label, active, onClick, mobile }) {
            return (
                <button 
                onClick={onClick}
                className={`flex items-center gap-3 w-full p-3 rounded-lg transition-all duration-200 ${
                    active ? 'bg-emerald-800 text-white font-medium shadow-inner' : 'text-emerald-100 hover:bg-emerald-800/40 hover:text-white'
                } ${mobile ? 'text-lg' : 'text-sm'}`}
                >
                <Icon size={mobile ? 24 : 18} />
                {label}
                </button>
            );
        }

        function LoginScreen({ checkUserProfile }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                if (!email || !password) { setErrorMsg("Preencha o e-mail e a senha."); return; }
                setIsLoading(true);
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    // onAuthStateChanged no App vai chamar checkUserProfile automaticamente
                } catch (error) {
                    const msgs = {
                        'auth/user-not-found': 'Usuário não encontrado. Contate o administrador.',
                        'auth/wrong-password': 'Senha incorreta. Tente novamente.',
                        'auth/invalid-email': 'Formato de e-mail inválido.',
                        'auth/invalid-credential': 'E-mail ou senha incorretos.',
                        'auth/too-many-requests': 'Muitas tentativas. Aguarde alguns minutos.',
                    };
                    setErrorMsg(msgs[error.code] || "Erro no login: " + error.message);
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-emerald-900 to-emerald-800 flex items-center justify-center p-4">
                <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md animate-scale-up">
                    <div className="text-center mb-8">
                    <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                        <Truck className="text-emerald-600" size={32} />
                    </div>
                    <h1 className="text-3xl font-bold text-gray-800 tracking-tight">Fotus Agro</h1>
                    <p className="text-gray-500 mt-1">Plataforma de Expedições</p>
                    </div>
                    <form onSubmit={handleAuth} className="space-y-4">
                    <Input label="E-mail Corporativo" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="nome@fotusagro.com.br" />
                    <Input label="Senha" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
                    {errorMsg && (
                        <div className="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg flex items-center gap-2">
                            <AlertTriangle size={16} className="shrink-0"/> {errorMsg}
                        </div>
                    )}
                    <Button type="submit" className="w-full py-3 text-lg" disabled={isLoading}>
                        {isLoading ? <><Loader2 size={18} className="animate-spin"/> Entrando...</> : 'Acessar Sistema'}
                    </Button>
                    </form>
                </div>
                </div>
            );
        }

        function Dashboard({ userProfile, expeditions, actions, setView }) {
            const myExpeditions = expeditions.filter(e => userProfile.role === 'gerente' || e.userId === userProfile.uid);
            const myActions = actions.filter(a => userProfile.role === 'gerente' || a.responsibleId === userProfile.uid);
            
            const pendingActions = myActions.filter(a => a.status === 'aberta' || a.status === 'atrasada').length;
            const completedActions = myActions.filter(a => a.status === 'concluida').length;
            const activeExpeditions = myExpeditions.filter(e => e.status === 'em_andamento').length;

            return (
                <div className="space-y-6 animate-fade-in">
                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                    <h2 className="text-2xl font-bold text-gray-800">Olá, {userProfile.name.split(' ')[0]}</h2>
                    <p className="text-gray-500 text-sm">Bem-vindo ao painel de controle.</p>
                    </div>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {[
                    { label: "Em Campo", value: activeExpeditions, icon: Truck, color: "text-blue-600", bg: "bg-blue-50" },
                    { label: "Ações Pendentes", value: pendingActions, icon: AlertTriangle, color: "text-amber-600", bg: "bg-amber-50" },
                    { label: "Concluídas", value: completedActions, icon: CheckCircle2, color: "text-emerald-600", bg: "bg-emerald-50" },
                    { label: "Eficiência", value: `${myActions.length > 0 ? Math.round((completedActions / myActions.length) * 100) : 0}%`, icon: BarChart3, color: "text-purple-600", bg: "bg-purple-50" }
                    ].map((stat, i) => (
                    <div key={i} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center text-center hover:shadow-md transition-shadow">
                        <div className={`p-3 rounded-full mb-3 ${stat.bg}`}><stat.icon className={stat.color} size={24} /></div>
                        <span className="text-2xl font-bold text-gray-800">{stat.value}</span>
                        <span className="text-gray-500 text-xs font-medium uppercase tracking-wide mt-1">{stat.label}</span>
                    </div>
                    ))}
                </div>

                <div className="grid md:grid-cols-2 gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="font-bold text-gray-800 flex items-center gap-2"><Truck size={18} className="text-gray-400"/> Expedições Ativas</h3>
                        <button onClick={() => setView('expeditions')} className="text-sm text-emerald-600 hover:text-emerald-700 font-medium">Ver todas</button>
                    </div>
                    <div className="space-y-4 flex-1">
                        {myExpeditions.filter(e => e.status === 'em_andamento').slice(0, 3).map(exp => (
                        <div key={exp.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-100 hover:border-emerald-200 transition-colors">
                            <div>
                            <p className="font-bold text-gray-800">{exp.title}</p>
                            <p className="text-xs text-gray-500 mt-1 flex items-center gap-2">
                                <MapPin size={12}/> {exp.region}
                                <span className="w-1 h-1 bg-gray-300 rounded-full"/>
                                <Calendar size={12}/> {formatDate(exp.startDate)}
                            </p>
                            </div>
                            <div className={`px-2 py-1 rounded text-xs font-medium border ${getStatusColor(exp.status, 'expedition')}`}>
                            {exp.status.replace('_', ' ')}
                            </div>
                        </div>
                        ))}
                        {myExpeditions.filter(e => e.status === 'em_andamento').length === 0 && <div className="text-center py-8 text-gray-400 text-sm">Nenhuma expedição ativa.</div>}
                    </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="font-bold text-gray-800 flex items-center gap-2"><CheckSquare size={18} className="text-gray-400"/> Próximas Ações</h3>
                        <button onClick={() => setView('actions')} className="text-sm text-emerald-600 hover:text-emerald-700 font-medium">Ver todas</button>
                    </div>
                    <div className="space-y-3 flex-1">

                        <div key={action.id} className="flex items-start gap-3 p-3 bg-white border border-gray-100 rounded-lg hover:shadow-sm transition-shadow">
                            <div className={`mt-1.5 w-2.5 h-2.5 rounded-full flex-shrink-0 ${action.priority === 'alta' ? 'bg-red-500' : action.priority === 'media' ? 'bg-amber-400' : 'bg-blue-400'}`} />

                            </div>

                    </div>
